idea:
  title: Narrative Space in LLMs
  domain: artificial_intelligence
  hypothesis: 'When large language models are asked to write stories involving spatial
    navigation, such as moving through a building, they may diverge from human narrative
    patterns in specific ways. There may exist a distinct grammar or structure to
    LLM-generated spatial narratives, analogous to the sentence structures observed
    in RLHF-trained models.

    '
  background:
    description: "When LLMs are asked to write a story, and write about going through\
      \ space, say in a building\u2014do they diverge from humans in certain ways?\
      \ Just like RLHF'd models tend to use certain sentence structure, one might\
      \ imagine a grammar of LLM spatial narratives.\n"
